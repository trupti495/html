<!DOCTYPE html>
<html>
<head>
<style>
*{
    margin:0;
    padding:0;
}

.box{
    width:600px;
    margin:50px auto;
    border:1px solid black;
    display:flex;
}

.left{
    width:40%;
    background:blue;
    color:white;
    padding:20px;
}

.right{
    width:60%;
    padding:20px;
}

input{
    width:100%;
    padding:10px;
}

button{
    width:100%;
    padding:10px;
    background:orange;
    color:white;
    border:none;
}

#link{
    display:block;
    margin-top:20px;
    text-align:center;
}
</style>
</head>

<body>

<div class="box">
    <div class="left">
        <h1>Login</h1>
        <p>Get access to your Orders, Wishlist and Recommendations</p>
    </div>

    <div class="right">
        <input type="text" placeholder="Enter Mobile Number">
        <br><br>
        <button>Request OTP</button>
        <a href="#" id="link">Create an Account</a>
    </div>
</div>

</body>
</html>
