<!DOCTYPE html>
<html>
<head>
<style>
.box{
    width:150px;
    height:150px;
    margin:20px;
    display:inline-block;
    color:white;
    text-align:center;
    line-height:150px;
    font-size:20px;
    font-weight:bold;
}

.leaf{
    background:deepskyblue;
    border-radius:0 100% 0 100%;
}

.oval{
    background:orange;
    border-radius:50%;
    width:200px;
}

.circle{
    background:magenta;
    border-radius:50%;
}

.tab{
    background:deepskyblue;
    border-radius:0 0 50% 50%;
}

.three{
    background:blue;
    border-radius:0 50% 50% 50%;
}
</style>
</head>
<body>

<div class="box leaf">Leaf</div>

<div class="box oval">Oval</div>

<div class="box circle">Circle</div>

<div class="box tab">Tab</div>

<div class="box three">Three Sided</div>

</body>
</html>
